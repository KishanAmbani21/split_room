name: room_expense_manager
description: Android room expense manager — Supabase data, Firebase FCM push.
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^19.0.0
  supabase_flutter: ^2.12.4
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.5
  package_info_plus: ^9.0.0
  crypto: ^3.0.7
  image_picker: ^1.1.2
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
